<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Тайный Санта</title>
    <link rel="stylesheet" href="styles.css?v=5" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <header>
      <h1>Тайный Санта</h1>
      <p class="app-page-lead muted">Ты видишь только того, кому даришь. Кто дарит тебе — скрыто.</p>
    </header>
    <div id="banner"></div>
    <div id="box" class="card card--data">Загрузка…</div>
    <p id="err" class="err"></p>
    <script src="api.js?v=5"></script>
    <script src="nav.js?v=5"></script>
    <script>
      (async () => {
        const el = document.getElementById("box");
        try {
          const s = await SA.apiGet("/api/santa");
          if (s.need_group) {
            document.getElementById("banner").innerHTML = SA.needGroupBanner;
            el.innerHTML =
              "<p>Сначала выберите учебную группу в боте.</p>";
            return;
          }
          if (!s.active) {
            el.innerHTML =
              "<p>Игра не запущена. Попроси старосту выполнить <code>/start_santa</code> в чате с ботом.</p>";
            return;
          }
          if (!s.receiver_name) {
            el.innerHTML =
              "<p>Ты не в списке участников (нужна роль студента в группе) или игра только что создана — зайди позже.</p>";
            return;
          }
          el.innerHTML =
            "<p class=\"muted\" style=\"margin:0 0 4px;font-size:0.9rem\">Ты даришь подарок</p>" +
            "<div class=\"santa-receiver\">" +
            escapeHtml(s.receiver_name) +
            "</div>";
        } catch (e) {
          document.getElementById("err").textContent = String(e);
          el.textContent = "";
        }
      })();
      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[
            c
          ])
        );
      }
    </script>
  </body>
</html>
