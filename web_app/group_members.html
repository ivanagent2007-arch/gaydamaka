<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Состав группы</title>
    <link rel="stylesheet" href="styles.css?v=6" />
    <link rel="preconnect" href="https://telegram.org" crossorigin />
    <link rel="dns-prefetch" href="https://telegram.org" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <header>
      <h1>Состав группы</h1>
      <p id="hint" class="app-page-lead muted"></p>
    </header>
    <div id="banner"></div>
    <div id="list" class="card card--data list-in-card">Загрузка…</div>
    <div id="leaveCard" class="card card--form" hidden>
      <h2 class="block-title">Выйти из группы</h2>
      <p id="leaveDesc" class="block-desc muted"></p>
      <button type="button" id="leaveBtn">Выйти из группы</button>
      <p id="leaveMsg" class="muted" style="margin: 8px 0 0; min-height: 1.2em"></p>
    </div>
    <p id="err" class="err"></p>
    <script src="api.js?v=6"></script>
    <script src="nav.js?v=6"></script>
    <script>
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function roleLabel(role) {
        if (role === "elder") return "староста";
        if (role === "deputy_elder") return "зам. старосты";
        return "студент";
      }

      async function kickMember(id, name) {
        if (
          !confirm(
            "Исключить «" + name + "» из группы? У человека пропадёт доступ к расписанию и материалам."
          )
        ) {
          return;
        }
        try {
          document.getElementById("err").textContent = "";
          await SA.apiPost("/api/group/kick", { user_id: id });
          await load();
        } catch (e) {
          document.getElementById("err").textContent = String(e);
        }
      }

      async function appointDeputy(id, name) {
        if (
          !confirm(
            "Назначить «" + name + "» заместителем старосты? Прежний зам (если был) будет снят."
          )
        ) {
          return;
        }
        try {
          document.getElementById("err").textContent = "";
          await SA.apiPost("/api/group/deputy", { user_id: id });
          await load();
        } catch (e) {
          document.getElementById("err").textContent = String(e);
        }
      }

      async function demoteDeputy() {
        if (!confirm("Снять заместителя с должности? Он останется в группе как студент.")) {
          return;
        }
        try {
          document.getElementById("err").textContent = "";
          await SA.apiPost("/api/group/deputy", { user_id: null });
          await load();
        } catch (e) {
          document.getElementById("err").textContent = String(e);
        }
      }

      async function transferElder(id, name) {
        if (
          !confirm(
            "Передать роль старосты пользователю «" +
              name +
              "»? Ты станешь обычным студентом, он — старостой. Действие необратимо без участия нового старосты."
          )
        ) {
          return;
        }
        try {
          document.getElementById("err").textContent = "";
          await SA.apiPost("/api/group/transfer_elder", { user_id: id });
          await load();
        } catch (e) {
          document.getElementById("err").textContent = String(e);
        }
      }

      async function leaveGroup() {
        if (
          !confirm(
            "Выйти из группы? Ты потеряешь доступ к расписанию, дедлайнам и материалам. Снова войти можно по коду от старосты."
          )
        ) {
          return;
        }
        var msgEl = document.getElementById("leaveMsg");
        msgEl.textContent = "";
        document.getElementById("err").textContent = "";
        try {
          await SA.apiPost("/api/group/leave", {});
          msgEl.textContent = "Ты вышел из группы.";
          await load();
        } catch (e) {
          // Сервер вернёт 400 с конкретным текстом, например «сначала передай роль».
          msgEl.textContent = String(e);
        }
      }

      async function load() {
        var el = document.getElementById("list");
        var hint = document.getElementById("hint");
        var leaveCard = document.getElementById("leaveCard");
        // На каждом refresh скрываем «Выйти» — покажем заново, если юзер в группе.
        leaveCard.hidden = true;
        try {
          var me = await SA.apiGet("/api/me");
          var data = await SA.apiGet("/api/group/members");
          if (data.need_group || !me.study_group_id) {
            document.getElementById("banner").innerHTML = SA.needGroupBanner;
            el.textContent = "Доступно после вступления в группу.";
            hint.textContent = "";
            return;
          }
          if (me.is_chief_elder) {
            hint.textContent =
              "Ты староста: можешь исключать студентов и заместителя, назначать зама. Старосту через бота исключить нельзя.";
          } else if (me.is_elder) {
            hint.textContent =
              "Ты заместитель: те же права, что у старосты, кроме исключения из группы и назначения зама.";
          } else {
            hint.textContent = "Список одногруппников.";
          }
          if (!data.items.length) {
            el.textContent = "В группе пока никого нет.";
            return;
          }
          el.innerHTML = "";
          var title = document.createElement("div");
          title.className = "member-list-head muted";
          title.textContent = "«" + data.group_name + "» · " + data.items.length + " чел.";
          el.appendChild(title);
          data.items.forEach(function (m) {
            var row = document.createElement("div");
            row.className = "member-row";
            var info = document.createElement("div");
            info.className = "member-info";
            info.innerHTML =
              "<strong>" +
              escapeHtml(m.full_name || "—") +
              "</strong><br/><span class=\"muted\">" +
              escapeHtml(roleLabel(m.role)) +
              "</span>";
            row.appendChild(info);

            var chief = !!me.is_chief_elder;
            var canKick =
              chief && m.role !== "elder" && m.id !== me.db_user_id;
            var canAppointDeputy =
              chief && m.role === "student" && m.id !== me.db_user_id;
            var canDemoteDeputy = chief && m.role === "deputy_elder";
            // Староста может передать роль любому НЕ-себе члену группы (зам и студент).
            var canTransferElder =
              chief && m.role !== "elder" && m.id !== me.db_user_id;

            if (canKick || canAppointDeputy || canDemoteDeputy || canTransferElder) {
              var actions = document.createElement("div");
              actions.className = "member-actions";
              if (canTransferElder) {
                var trBtn = document.createElement("button");
                trBtn.type = "button";
                trBtn.className = "secondary member-deputy-btn";
                trBtn.textContent = "Передать старосту";
                trBtn.addEventListener("click", function () {
                  transferElder(m.id, m.full_name || "");
                });
                actions.appendChild(trBtn);
              }
              if (canKick) {
                var kickBtn = document.createElement("button");
                kickBtn.type = "button";
                kickBtn.className = "secondary member-kick-btn";
                kickBtn.textContent = "Исключить";
                kickBtn.addEventListener("click", function () {
                  kickMember(m.id, m.full_name || "");
                });
                actions.appendChild(kickBtn);
              }
              if (canAppointDeputy) {
                var depBtn = document.createElement("button");
                depBtn.type = "button";
                depBtn.className = "secondary member-deputy-btn";
                depBtn.textContent = "Заместитель";
                depBtn.addEventListener("click", function () {
                  appointDeputy(m.id, m.full_name || "");
                });
                actions.appendChild(depBtn);
              }
              if (canDemoteDeputy) {
                var demBtn = document.createElement("button");
                demBtn.type = "button";
                demBtn.className = "secondary member-deputy-btn";
                demBtn.textContent = "Снять зама";
                demBtn.addEventListener("click", function () {
                  demoteDeputy();
                });
                actions.appendChild(demBtn);
              }
              row.appendChild(actions);
            }
            el.appendChild(row);
          });

          // Карточка «Выйти из группы» — внизу страницы, для всех у кого есть группа.
          var leaveCard = document.getElementById("leaveCard");
          var leaveDesc = document.getElementById("leaveDesc");
          var leaveBtn = document.getElementById("leaveBtn");
          var leaveMsg = document.getElementById("leaveMsg");
          leaveCard.hidden = false;
          leaveMsg.textContent = "";
          var hasOtherMembers = data.items.some(function (m) {
            return m.id !== me.db_user_id;
          });
          if (me.is_chief_elder && hasOtherMembers) {
            leaveDesc.textContent =
              "Ты староста. Чтобы выйти из группы, сначала передай роль старосты другому участнику (кнопка «Передать старосту» в его строке выше). После передачи ты станешь студентом и сможешь выйти.";
            leaveBtn.disabled = true;
            leaveBtn.textContent = "Сначала передайте роль старосты";
          } else if (me.is_chief_elder) {
            // Староста и в группе один — выход равносилен распаду группы.
            leaveDesc.textContent =
              "Ты единственный в группе. После выхода группа останется без старосты — снова войти по тому же коду не получится.";
            leaveBtn.disabled = false;
            leaveBtn.textContent = "Выйти из группы";
          } else {
            leaveDesc.textContent =
              "После выхода ты потеряешь доступ к материалам этой группы. Снова войти можно по коду от старосты.";
            leaveBtn.disabled = false;
            leaveBtn.textContent = "Выйти из группы";
          }
          if (!leaveBtn._wired) {
            leaveBtn.addEventListener("click", leaveGroup);
            leaveBtn._wired = true;
          }
        } catch (e) {
          document.getElementById("err").textContent = String(e);
          el.textContent = "";
        }
      }

      load();
    </script>
  </body>
</html>
